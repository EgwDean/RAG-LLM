# ============================================================
# RAG-LLM Hybrid Retrieval Pipeline -- Configuration
# ============================================================
#
# This file controls every tunable aspect of the pipeline.
# Edit the settings below, then run:
#     python src/pipeline.py
#
# The pipeline automatically detects which processing steps
# have already been completed and skips them.  If you change
# the dataset list or the embedding model, all cached
# artifacts for the affected dataset(s) are rebuilt.
# ============================================================

# ------------------------------------------------------------
# Datasets
# ------------------------------------------------------------
# Stats: (test queries | corpus docs | avg relevant docs per query)
#
# -- Small (fast) ------------------------------------------------
#   scifact            300 queries  |    5 084 docs |  1.1 avg
#   nfcorpus           323 queries  |    3 633 docs | 38.2 avg
#   arguana          1 406 queries  |    8 674 docs |  1.0 avg
#
# -- Medium -------------------------------------------------------
#   fiqa               648 queries  |   57 638 docs |  2.6 avg
#   scidocs          1 000 queries  |   25 657 docs |  4.9 avg
#   webis-touche2020    49 queries  |  382 545 docs | 19.0 avg
#   trec-covid          50 queries  |  171 332 docs |493.5 avg
#
# -- Large (slow, high memory) ------------------------------------
#   nq               3 452 queries  |    2.68M docs |  1.2 avg
#   quora            10 000 queries |  522 931 docs |  1.6 avg  (split: dev)
#   climate-fever     1 535 queries |    5.42M docs |  3.0 avg
#   hotpotqa          7 405 queries |    5.23M docs |  2.0 avg
#   fever             6 666 queries |    5.42M docs |  1.2 avg
#   dbpedia-entity      400 queries |    4.63M docs | 38.2 avg  (split: dev)
#   msmarco           6 980 queries |    8.84M docs |  1.1 avg  (split: dev)
# -----------------------------------------------------------------
datasets:
  - scifact
  - nfcorpus
  - arguana
  - fiqa
  - scidocs
  #- webis-touche2020
  #- trec-covid
  #- nq
  #- quora
  #- climate-fever
  #- hotpotqa
  #- fever
  #- dbpedia-entity
  #- msmarco

# ------------------------------------------------------------
# Paths (relative to the project root)
# ------------------------------------------------------------
# These are base directories; per-dataset sub-paths are built
# at runtime by the pipeline.
paths:
  datasets_folder: "data/datasets"
  results_folder:  "data/results"
  processed_folder: "data/processed_data"

# ------------------------------------------------------------
# Preprocessing
# ------------------------------------------------------------
preprocessing:
  stemmer_language: "english"

# ------------------------------------------------------------
# BM25 (sparse retrieval)
# ------------------------------------------------------------
bm25:
  k1: 1.2
  b: 0.75
  use_stemming: true

# ------------------------------------------------------------
# BM25 optimization grid search
# ------------------------------------------------------------
bm25_optimization:
  k1_values: [0.8, 1.2, 1.6, 2.0]
  b_values: [0.0, 0.25, 0.5, 0.75, 1.0]
  use_stemming_values: [true, false]

# ------------------------------------------------------------
# Embedding model
# ------------------------------------------------------------
embeddings:
  #model_name: "BAAI/bge-m3"
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 64   # lower to 8-16 for large models on GPU with long documents
  # max_seq_length: 512   # truncate docs to this many tokens before encoding.

# ------------------------------------------------------------
# Dense search
# ------------------------------------------------------------
dense_search:
  query_chunk_size: 100
  corpus_chunk_size: 50000

# ------------------------------------------------------------
# Benchmark / evaluation
# ------------------------------------------------------------
benchmark:
  #evaluation_mode: "loodo"
  evaluation_mode: "within_dataset"
  top_k: 100
  ndcg_k: 10
  rrf:
    k: 60               # RRF damping constant (Cormack et al. 2009)

# ------------------------------------------------------------
# Within-dataset supervised routing evaluation
# ------------------------------------------------------------
within_dataset_evaluation:
  train_fraction: 0.8
  n_repeats: 5
  shuffle: true

# ------------------------------------------------------------
# Supervised query-level routing benchmark (LOODO)
# ------------------------------------------------------------
# Used by: python src/retrieve_and_evaluate.py
supervised_routing:
  # Feature construction
  overlap_k: 10
  epsilon: 1.0e-8
  ce_smoothing_alpha: 1.0
  feature_workers: 8

  # Model/training setup
  model_type: "logistic"
  model_type: "random_forest"
  regularization: "l2"
  C: 1.0
  fit_intercept: true
  optimizer: "lbfgs"
  learning_rate: 0.05
  epochs: 300
  batch_size: 256
  early_stopping_patience: 30
  early_stopping_min_delta: 1.0e-6
  seed: 42
  use_cuda_if_available: true

# ------------------------------------------------------------
# Random Forest router (used when supervised_routing.model_type=random_forest)
# ------------------------------------------------------------
random_forest:
  n_estimators: 300
  max_depth: 8
  min_samples_split: 8
  min_samples_leaf: 4
  max_features: "sqrt"
  bootstrap: true
  n_jobs: -1
  random_state: 42